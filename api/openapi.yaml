  # =========================================================================
  # Jobs
  # =========================================================================

  /jobs:
    get:
      operationId: listJobs
      summary: List jobs
      tags: [jobs]
      x-ufm-upstream: GET /ufmRest/jobs
      parameters:
        - $ref: "#/components/parameters/cursor"
        - $ref: "#/components/parameters/limit"
        - name: status
          in: query
          description: Filter by job status.
          schema:
            type: string
            enum: [running, completed, failed, aborted]
        - name: operation
          in: query
          description: Filter by operation type.
          schema:
            type: string
        - name: parent_only
          in: query
          description: Only return parent jobs (exclude sub-jobs).
          schema:
            type: boolean
        - name: system_ids
          in: query
          description: Filter by associated system IDs (comma-separated).
          schema:
            type: string
      responses:
        "200":
          description: Paginated list of jobs.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobList"
        default:
          $ref: "#/components/responses/Error"

    delete:
      operationId: abortAllJobs
      summary: Abort all active jobs
      tags: [jobs]
      x-ufm-upstream: POST /ufmRest/jobs/abortall
      responses:
        "200":
          description: All active jobs aborted.
        default:
          $ref: "#/components/responses/Error"

  /jobs/{job_id}:
    parameters:
      - name: job_id
        in: path
        required: true
        schema:
          type: string

    get:
      operationId: getJob
      summary: Get a job
      tags: [jobs]
      x-ufm-upstream: GET /ufmRest/jobs/{job_id}
      parameters:
        - name: include
          in: query
          description: "Additional data: `sub_jobs`, `full`."
          schema:
            type: string
      responses:
        "200":
          description: Job details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
          headers:
            Retry-After:
              description: Seconds to wait before polling again (when job is still running).
              schema:
                type: integer
        "404":
          $ref: "#/components/responses/NotFound"
        default:
          $ref: "#/components/responses/Error"

    delete:
      operationId: deleteJob
      summary: Delete a job record
      tags: [jobs]
      x-ufm-upstream: DELETE /ufmRest/jobs/{job_id}
      responses:
        "204":
          description: Job record deleted.
        "404":
          $ref: "#/components/responses/NotFound"
        default:
          $ref: "#/components/responses/Error"

  /jobs/{job_id}/abort:
    parameters:
      - name: job_id
        in: path
        required: true
        schema:
          type: string

    post:
      operationId: abortJob
      summary: Abort a running job
      tags: [jobs]
      x-ufm-upstream: PUT /ufmrest/jobs/status=Aborted
      responses:
        "200":
          description: Job aborted.
        default:
          $ref: "#/components/responses/Error"

