#
# Clean facade API for NVIDIA UFM Enterprise.
# This spec defines the API we wish UFM had — consistent REST semantics,
# standard error envelope, cursor-based pagination, and proper resource modeling.
#
# A translation proxy (ufm-api) maps these clean endpoints to UFM's actual
# REST API (/ufmRest/*, /ufmRestV2/*, /ufmRestV3/*).
#
# UFM REST API reference: https://docs.nvidia.com/networking/display/ufmenterpriserestapiv6242
# Target UFM version: 6.24.2

openapi: "3.0.3"
info:
  title: UFM Facade API
  description: |
    A clean, consistent REST facade for NVIDIA Unified Fabric Manager (UFM) Enterprise.

    This API proxies to a UFM Enterprise instance, normalizing its heterogeneous
    endpoint patterns into standard RESTful resources with consistent naming,
    pagination, error handling, and authentication.

    ## Design principles

    - **Resource-oriented**: every endpoint operates on a noun (`/partitions`, `/systems`, `/ports`)
    - **Consistent verbs**: `GET` (read), `POST` (create), `PUT` (replace), `PATCH` (update), `DELETE` (remove)
    - **Standard error envelope**: all errors return `{"error": {"code": "...", "message": "...", "details": [...]}}`
    - **Cursor-based pagination**: list endpoints support `?cursor=&limit=`
    - **Single auth scheme**: Bearer token or HTTP Basic, no path-based auth switching

    ## UFM compatibility

    Each operation documents the upstream UFM endpoint it maps to via the
    `x-ufm-upstream` extension. This allows maintainers to trace clean
    operations back to UFM's actual API surface.
  version: 0.1.0
  contact:
    name: NCP Red Hat Stack
  license:
    name: Apache-2.0

servers:
  - url: /api/v1
    description: Facade API (all endpoints relative to this base)

security:
  - bearerAuth: []
  - basicAuth: []

tags:
  - name: partitions
    description: |
      InfiniBand partition (PKEY) lifecycle management.
      Maps to UFM's `/ufmRest/resources/pkeys` endpoints.
  - name: partition-members
    description: |
      GUID and host membership within partitions.
      Maps to UFM's PKEY GUID/host add/remove endpoints.
  - name: systems
    description: |
      Fabric systems (switches, hosts, gateways, routers).
      Maps to UFM's `/ufmRest/resources/systems` endpoints.
  - name: ports
    description: |
      Physical and virtual port inventory and status.
      Maps to UFM's `/ufmRest/resources/ports` and `/ufmRest/resources/vports`.
  - name: jobs
    description: |
      Asynchronous job tracking for long-running operations.
      Maps to UFM's `/ufmRest/jobs` endpoints.
  - name: monitoring
    description: |
      Performance monitoring sessions, snapshots, and templates.
      Maps to UFM's `/ufmRest/monitoring` endpoints.
  - name: telemetry
    description: |
      Real-time and historical telemetry data.
      Maps to UFM's `/ufmRest/telemetry` endpoints.
  - name: topology
    description: |
      Logical model — environments, logical servers, computes, networks.
      Maps to UFM's `/ufmRest/resources/environments` and nested resources.
  - name: actions
    description: |
      Infrastructure actions — reboot, firmware upgrade, port operations.
      Splits UFM's monolithic `POST /ufmRest/actions` into proper sub-resources.
  - name: mirroring
    description: |
      Port mirroring configuration and control.
      Maps to UFM's `/ufmRest/app/mirrorings` endpoints.
  - name: templates
    description: |
      Provisioning templates for switch configuration.
      Maps to UFM's `/ufmRest/templates` endpoints.
  - name: fabric-health
    description: |
      Fabric validation tests and health reports.
      Maps to UFM's `/ufmRest/fabricValidation` and `/ufmRest/reports`.
  - name: config
    description: |
      UFM server configuration and version information.
      Maps to UFM's `/ufmRest/app/ufm_config` and `/ufmRest/app/ufm_version`.
  - name: discovery
    description: |
      Fabric discovery and inventory refresh.
      Maps to UFM's `/ufmRest/monitoring/inventory` and `/ufmRest/actions/fabric_discovery_refresh`.

# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------

paths:
  # =========================================================================
  # Partitions (PKEYs)
  # =========================================================================

  /partitions:
    get:
      operationId: listPartitions
      summary: List all partitions
      tags: [partitions]
      x-ufm-upstream: GET /ufmRest/resources/pkeys
      parameters:
        - $ref: "#/components/parameters/cursor"
        - $ref: "#/components/parameters/limit"
        - name: include
          in: query
          description: |
            Comma-separated list of additional data to include.
            Supported values: `members`, `qos`, `port_info`, `sharp_state`.
          schema:
            type: string
            example: "members,qos"
      responses:
        "200":
          description: Paginated list of partitions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartitionList"
        default:
          $ref: "#/components/responses/Error"

    post:
      operationId: createPartition
      summary: Create a partition
      description: |
        Creates a new InfiniBand partition (PKEY). Optionally include initial
        GUID members in the request body.

        Upstream, this maps to either `POST /ufmRest/resources/pkeys/add`
        (empty partition) or `POST /ufmRest/resources/pkeys/` (with GUIDs),
        depending on whether `members` is provided.
      tags: [partitions]
      x-ufm-upstream: POST /ufmRest/resources/pkeys/add | POST /ufmRest/resources/pkeys/
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PartitionCreate"
      responses:
        "201":
          description: Partition created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Partition"
        "409":
          description: Partition with this PKEY already exists.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        default:
          $ref: "#/components/responses/Error"

  /partitions/{pkey}:
    parameters:
      - $ref: "#/components/parameters/pkey"

    get:
      operationId: getPartition
      summary: Get a partition
      tags: [partitions]
      x-ufm-upstream: GET /ufmRest/resources/pkeys/{pkey}
      parameters:
        - name: include
          in: query
          schema:
            type: string
            example: "members,qos"
      responses:
        "200":
          description: Partition details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Partition"
        "404":
          $ref: "#/components/responses/NotFound"
        default:
          $ref: "#/components/responses/Error"

    put:
      operationId: replacePartition
      summary: Replace a partition's configuration
      description: |
        Replaces the full GUID membership and QoS settings of a partition.
        All existing members not in the new list are removed.
      tags: [partitions]
      x-ufm-upstream: PUT /ufmRest/resources/pkeys/
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PartitionReplace"
      responses:
        "200":
          description: Partition replaced.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Partition"
        "404":
          $ref: "#/components/responses/NotFound"
        default:
          $ref: "#/components/responses/Error"

    delete:
      operationId: deletePartition
      summary: Delete a partition
      tags: [partitions]
      x-ufm-upstream: DELETE /ufmRest/resources/pkeys/{pkey}
      responses:
        "204":
          description: Partition deleted.
        "404":
          $ref: "#/components/responses/NotFound"
        default:
          $ref: "#/components/responses/Error"

  /partitions/{pkey}/qos:
    parameters:
      - $ref: "#/components/parameters/pkey"

    put:
      operationId: updatePartitionQoS
      summary: Update partition QoS settings
      description: |
        Updates MTU limit, service level, and rate limit for a partition.
        Note: UFM requires a restart for QoS changes to take effect.
      tags: [partitions]
      x-ufm-upstream: PUT /ufmRest/resources/pkeys/qos_conf
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PartitionQoS"
      responses:
        "200":
          description: QoS updated. UFM restart required for changes to take effect.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartitionQoS"
        default:
          $ref: "#/components/responses/Error"

  /partitions/{pkey}/sharp:
    parameters:
      - $ref: "#/components/parameters/pkey"

    put:
      operationId: updatePartitionSHARP
      summary: Enable or disable SHARP reservation
      tags: [partitions]
      x-ufm-upstream: PUT /ufmRest/resources/pkeys/{pkey}/sharp-reservation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled:
                  type: boolean
                  description: Enable or disable SHARP reservation for this partition.
      responses:
        "200":
          description: SHARP reservation updated.
        default:
          $ref: "#/components/responses/Error"

  /partitions/{pkey}/last-updated:
    parameters:
      - $ref: "#/components/parameters/pkey"

    get:
      operationId: getPartitionLastUpdated
      summary: Get partition last-updated timestamp
      tags: [partitions]
      x-ufm-upstream: GET /ufmRest/resources/pkeys/last_updated
      responses:
        "200":
          description: Last-updated timestamp.
          content:
            application/json:
              schema:
                type: object
                properties:
                  last_updated:
                    type: string
                    format: date-time
                    nullable: true
                    description: |
                      ISO 8601 timestamp of last modification.
                      Null if never modified since UFM restart.
        default:
          $ref: "#/components/responses/Error"

  # =========================================================================
  # Partition Members (GUIDs and Hosts)
  # =========================================================================

  /partitions/{pkey}/members:
    parameters:
      - $ref: "#/components/parameters/pkey"

    get:
      operationId: listPartitionMembers
      summary: List GUID members of a partition
      tags: [partition-members]
      x-ufm-upstream: GET /ufmRest/resources/pkeys/{pkey}?guids_data=true
      parameters:
        - $ref: "#/components/parameters/cursor"
        - $ref: "#/components/parameters/limit"
      responses:
        "200":
          description: Paginated list of GUID members.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartitionMemberList"
        "404":
          $ref: "#/components/responses/NotFound"
        default:
          $ref: "#/components/responses/Error"

    post:
      operationId: addPartitionMembers
      summary: Add GUIDs to a partition
      tags: [partition-members]
      x-ufm-upstream: POST /ufmRest/resources/pkeys/
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PartitionMembersAdd"
      responses:
        "200":
          description: Members added.
        default:
          $ref: "#/components/responses/Error"

    delete:
      operationId: removePartitionMembers
      summary: Remove GUIDs from a partition
      description: |
        Removes one or more GUIDs from a partition. Pass GUIDs in the
        request body as an array.

        Upstream, this translates to
        `DELETE /ufmRest/resources/pkeys/{pkey}/guids/{guid1},{guid2}`
        with comma-separated GUIDs in the path.
      tags: [partition-members]
      x-ufm-upstream: DELETE /ufmRest/resources/pkeys/{pkey}/guids/{guids}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [guids]
              properties:
                guids:
                  type: array
                  items:
                    type: string
                  description: GUIDs to remove.
                  example: ["98039b0300860ace", "98039b0300860acf"]
      responses:
        "200":
          description: Members removed.
        default:
          $ref: "#/components/responses/Error"

  /partitions/{pkey}/hosts:
    parameters:
      - $ref: "#/components/parameters/pkey"

    post:
      operationId: addPartitionHosts
      summary: Add hosts to a partition
      description: |
        Adds all ports of the named hosts to the partition.
        Returns a job for tracking the async operation.
      tags: [partition-members]
      x-ufm-upstream: POST /ufmRest/resources/pkeys/hosts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PartitionHostsAdd"
      responses:
        "202":
          description: Host addition accepted. Returns job for tracking.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        default:
          $ref: "#/components/responses/Error"

    delete:
      operationId: removePartitionHosts
      summary: Remove hosts from a partition
      description: |
        Upstream maps to
        `DELETE /ufmRest/resources/pkeys/{pkey}/hosts/{host1},{host2}`.
      tags: [partition-members]
      x-ufm-upstream: DELETE /ufmRest/resources/pkeys/{pkey}/hosts/{hosts}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [hosts]
              properties:
                hosts:
                  type: array
                  items:
                    type: string
                  description: Hostnames to remove.
      responses:
        "200":
          description: Hosts removed.
        default:
          $ref: "#/components/responses/Error"

  # =========================================================================
  # Systems
  # =========================================================================

  /systems:
    get:
      operationId: listSystems
      summary: List all fabric systems
      tags: [systems]
      x-ufm-upstream: GET /ufmRest/resources/systems
      parameters:
        - $ref: "#/components/parameters/cursor"
        - $ref: "#/components/parameters/limit"
        - name: type
          in: query
          description: Filter by system type.
          schema:
            type: string
            enum: [switch, host, gateway, router]
        - name: model
          in: query
          description: Filter by switch model.
          schema:
            type: string
        - name: role
          in: query
          description: Filter by topology role.
          schema:
            type: string
            enum: [core, tor, endpoint]
        - name: ip
          in: query
          description: Filter by system IP address.
          schema:
            type: string
            format: ipv4
        - name: rack
          in: query
          description: Filter by rack membership.
          schema:
            type: string
        - name: compute_status
          in: query
          description: Filter by compute allocation status.
          schema:
            type: string
            enum: [allocated, free]
        - name: include
          in: query
          description: |
            Comma-separated additional data: `ports`, `chassis`, `brief`.
          schema:
            type: string
      responses:
        "200":
          description: Paginated list of systems.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemList"
        default:
          $ref: "#/components/responses/Error"

  /systems/{system_id}:
    parameters:
      - name: system_id
        in: path
        required: true
        description: System name or GUID.
        schema:
          type: string

    get:
      operationId: getSystem
      summary: Get a system
      tags: [systems]
      x-ufm-upstream: GET /ufmRest/resources/systems/{system_id}
      parameters:
        - name: include
          in: query
          schema:
            type: string
      responses:
        "200":
          description: System details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/System"
        "404":
          $ref: "#/components/responses/NotFound"
        default:
          $ref: "#/components/responses/Error"

    patch:
      operationId: updateSystem
      summary: Update system properties
      description: Set manual IP, name, URL, or script attributes.
      tags: [systems]
      x-ufm-upstream: PUT /ufmRest/resources/systems/{system_id} | PUT /ufmRest/resources/systems/{system_id}/properties
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SystemUpdate"
      responses:
        "200":
          description: System updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/System"
        default:
          $ref: "#/components/responses/Error"

  /systems/{system_id}/reboot:
    parameters:
      - name: system_id
        in: path
        required: true
        schema:
          type: string

    post:
      operationId: rebootSystem
      summary: Reboot a system
      tags: [actions]
      x-ufm-upstream: POST /ufmRest/actions (action=reboot)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                in_band:
                  type: boolean
                  default: false
                  description: Use in-band reboot for unmanaged switches.
      responses:
        "202":
          description: Reboot initiated. Returns job for tracking.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        default:
          $ref: "#/components/responses/Error"

  /systems/{system_id}/firmware:
    parameters:
      - name: system_id
        in: path
        required: true
        schema:
          type: string

    post:
      operationId: upgradeSystemFirmware
      summary: Upgrade system firmware
      tags: [actions]
      x-ufm-upstream: POST /ufmRest/actions (action=firmware_upgrade)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                image:
                  type: string
                  description: Firmware image name.
                in_band:
                  type: boolean
                  default: false
      responses:
        "202":
          description: Firmware upgrade initiated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        default:
          $ref: "#/components/responses/Error"

  /systems/{system_id}/software:
    parameters:
      - name: system_id
        in: path
        required: true
        schema:
          type: string

    post:
      operationId: upgradeSystemSoftware
      summary: Upgrade system software
      tags: [actions]
      x-ufm-upstream: POST /ufmRest/actions (action=software_upgrade)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                image:
                  type: string
                  description: Software image name.
      responses:
        "202":
          description: Software upgrade initiated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        default:
          $ref: "#/components/responses/Error"

  /systems/{system_id}/dump:
    parameters:
      - name: system_id
        in: path
        required: true
        schema:
          type: string

    post:
      operationId: collectSystemDump
      summary: Collect system dump
      tags: [actions]
      x-ufm-upstream: POST /ufmRest/actions (action=system_dump)
      responses:
        "202":
          description: Dump collection initiated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        default:
          $ref: "#/components/responses/Error"

  /systems/{system_id}/health:
    parameters:
      - name: system_id
        in: path
        required: true
        schema:
          type: string

    put:
      operationId: setSystemHealth
      summary: Mark system healthy or unhealthy
      tags: [actions]
      x-ufm-upstream: POST /ufmRest/actions (action=mark_unhealthy) | POST /ufmRestV2/actions (action=restore_healthy)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [healthy]
              properties:
                healthy:
                  type: boolean
                isolation_policy:
                  type: string
                  description: Isolation policy when marking unhealthy.
      responses:
        "200":
          description: Health status updated.
        default:
          $ref: "#/components/responses/Error"

  /systems/power:
    get:
      operationId: listSystemsPower
      summary: Get power consumption for all managed switches
      tags: [systems]
      x-ufm-upstream: GET /ufmRest/resources/systems/power?csv_format=true
      responses:
        "200":
          description: Power consumption data.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SystemPower"
        default:
          $ref: "#/components/responses/Error"

  # =========================================================================
  # Ports
  # =========================================================================

  /ports:
    get:
      operationId: listPorts
      summary: List fabric ports
      tags: [ports]
      x-ufm-upstream: GET /ufmRest/resources/ports
      parameters:
        - $ref: "#/components/parameters/cursor"
        - $ref: "#/components/parameters/limit"
        - name: system
          in: query
          description: Filter by system name.
          schema:
            type: string
        - name: system_type
          in: query
          description: Filter by system type (e.g. Switch).
          schema:
            type: string
        - name: active
          in: query
          description: Only return active ports.
          schema:
            type: boolean
        - name: external
          in: query
          description: Only return external ports.
          schema:
            type: boolean
        - name: high_ber
          in: query
          description: Only return high BER ports.
          schema:
            type: boolean
        - name: high_ber_severity
          in: query
          description: Filter high BER ports by severity.
          schema:
            type: string
            enum: [warning, error]
        - name: include
          in: query
          description: "Additional data: `cable_info`."
          schema:
            type: string
      responses:
        "200":
          description: Paginated list of ports.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortList"
        default:
          $ref: "#/components/responses/Error"

  /ports/{port_name}:
    parameters:
      - name: port_name
        in: path
        required: true
        schema:
          type: string

    get:
      operationId: getPort
      summary: Get a port
      tags: [ports]
      x-ufm-upstream: GET /ufmRest/resources/ports/{port_name}
      responses:
        "200":
          description: Port details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Port"
        "404":
          $ref: "#/components/responses/NotFound"
        default:
          $ref: "#/components/responses/Error"

  /ports/{port_name}/enable:
    parameters:
      - name: port_name
        in: path
        required: true
        schema:
          type: string

    post:
      operationId: enablePort
      summary: Enable a port
      tags: [actions]
      x-ufm-upstream: POST /ufmRest/actions (action=port_enable)
      responses:
        "200":
          description: Port enabled.
        default:
          $ref: "#/components/responses/Error"

  /ports/{port_name}/disable:
    parameters:
      - name: port_name
        in: path
        required: true
        schema:
          type: string

    post:
      operationId: disablePort
      summary: Disable a port
      tags: [actions]
      x-ufm-upstream: POST /ufmRest/actions (action=port_disable)
      responses:
        "200":
          description: Port disabled.
        default:
          $ref: "#/components/responses/Error"

  /ports/{port_name}/reset:
    parameters:
      - name: port_name
        in: path
        required: true
        schema:
          type: string

    post:
      operationId: resetPort
      summary: Reset a port
      tags: [actions]
      x-ufm-upstream: POST /ufmRest/actions (action=port_reset)
      responses:
        "200":
          description: Port reset.
        default:
          $ref: "#/components/responses/Error"

  /virtual-ports:
    get:
      operationId: listVirtualPorts
      summary: List all virtual ports
      tags: [ports]
      x-ufm-upstream: GET /ufmRest/resources/vports
      parameters:
        - $ref: "#/components/parameters/cursor"
        - $ref: "#/components/parameters/limit"
        - name: system
          in: query
          description: Filter by system GUID.
          schema:
            type: string
        - name: port
          in: query
          description: Filter by physical port name.
          schema:
            type: string
      responses:
        "200":
          description: Paginated list of virtual ports.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualPortList"
        default:
          $ref: "#/components/responses/Error"

  # =========================================================================
  # Links
  # =========================================================================

  /links:
    get:
      operationId: listLinks
      summary: List fabric links
      tags: [ports]
      x-ufm-upstream: GET /ufmRest/resources/links
      parameters:
        - $ref: "#/components/parameters/cursor"
        - $ref: "#/components/parameters/limit"
      responses:
        "200":
          description: Paginated list of links.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkList"
        default:
          $ref: "#/components/responses/Error"

  /links/dump:
    post:
      operationId: collectLinkDump
      summary: Collect system dump from link endpoints
      tags: [actions]
