          $ref: "#/components/responses/Error"

    post:
      operationId: createTemplate
      summary: Create a provisioning template
      tags: [templates]
      x-ufm-upstream: POST /ufmRest/templates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProvisioningTemplateCreate"
      responses:
        "201":
          description: Template created.
          headers:
            Location:
              schema:
                type: string
        default:
          $ref: "#/components/responses/Error"

  /templates/{template_name}:
    parameters:
      - name: template_name
        in: path
        required: true
        schema:
          type: string

    get:
      operationId: getTemplate
      summary: Get a provisioning template
      tags: [templates]
      x-ufm-upstream: GET /ufmRest/templates/{template_name}
      responses:
        "200":
          description: Template with content.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProvisioningTemplate"
        default:
          $ref: "#/components/responses/Error"

    delete:
      operationId: deleteTemplate
      summary: Delete a provisioning template
      tags: [templates]
      x-ufm-upstream: DELETE /ufmRest/templates/{template_id}
      responses:
        "204":
          description: Template deleted.
        default:
          $ref: "#/components/responses/Error"

  /templates/refresh:
    post:
      operationId: refreshTemplates
      summary: Refresh the templates list
      tags: [templates]
      x-ufm-upstream: POST /ufmRest/templates/refresh
      responses:
        "200":
          description: Templates refreshed.
        default:
          $ref: "#/components/responses/Error"

  /templates/{template_name}/execute:
    parameters:
      - name: template_name
        in: path
        required: true
        schema:
          type: string

    post:
      operationId: executeTemplate
      summary: Execute a provisioning template on systems
      tags: [templates]
      x-ufm-upstream: POST /ufmRest/actions/provisioning/{template_name}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [system_ids]
              properties:
                system_ids:
                  type: array
                  items:
                    type: string
      responses:
        "202":
          description: Template execution initiated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        default:
          $ref: "#/components/responses/Error"

  # =========================================================================
  # Fabric Health
  # =========================================================================

  /fabric-validations:
    get:
      operationId: listFabricValidationTests
      summary: List available fabric validation tests
      tags: [fabric-health]
      x-ufm-upstream: GET /ufmRest/fabricValidation/tests
      responses:
        "200":
          description: List of available tests.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
                example:
                  - CheckLids
                  - CheckLinks
                  - CheckSubnetManager
                  - CheckDuplicateNodes
                  - CheckDuplicateGuids
                  - CheckRouting
                  - CheckLinkSpeed
                  - CheckLinkWidth
                  - CheckPartitionKey
                  - CheckTemperature
                  - CheckCables
                  - CheckSymbolBER
                  - RailOptimizedTopologyValidation
                  - TreeTopologyValidation
                  - SocketDirectModeReporting
                  - ValidateSMConfiguration
                  - ValidateNodesFirmwareVersion
                  - ValidateSwitchesCPLDVersion
        default:
          $ref: "#/components/responses/Error"

  /fabric-validations/{test_name}:
    parameters:
      - name: test_name
        in: path
        required: true
        schema:
          type: string

    post:
      operationId: runFabricValidationTest
      summary: Run a fabric validation test
      tags: [fabric-health]
      x-ufm-upstream: POST /ufmRest/fabricValidation/tests/{test_name}
      responses:
        "202":
          description: Test started. Returns job for tracking.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
          headers:
            Location:
              description: URI of the job tracking the test.
              schema:
                type: string
        "409":
          description: Test already running.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        default:
          $ref: "#/components/responses/Error"

  /reports:
    post:
      operationId: createReport
      summary: Create a fabric or UFM health report
      tags: [fabric-health]
      x-ufm-upstream: POST /ufmRest/reports/{report_type}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportCreate"
      responses:
        "202":
          description: Report generation started.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        default:
          $ref: "#/components/responses/Error"

  /reports/{report_id}:
    parameters:
      - name: report_id
        in: path
        required: true
        schema:
          type: string

    get:
      operationId: getReport
      summary: Get a report
      tags: [fabric-health]
      x-ufm-upstream: GET /ufmRest/reports/{report_id}
      responses:
        "200":
          description: Report data.
          content:
            application/json:
              schema:
                type: object
        default:
          $ref: "#/components/responses/Error"

    delete:
      operationId: deleteReport
      summary: Delete a report
      tags: [fabric-health]
      x-ufm-upstream: DELETE /ufmRest/reports/{report_id}
      responses:
        "204":
          description: Report deleted.
        default:
          $ref: "#/components/responses/Error"

  /reports/latest/{report_type}:
    parameters:
      - name: report_type
        in: path
        required: true
        schema:
          type: string
          enum: [Fabric_Health, UFM_Health, Topology_Compare]

    get:
      operationId: getLatestReport
      summary: Get the latest report of a given type
      tags: [fabric-health]
      x-ufm-upstream: GET /ufmRest/reports/last_report/{report_type}
      responses:
        "200":
          description: Latest report data.
          content:
            application/json:
              schema:
                type: object
        default:
          $ref: "#/components/responses/Error"

  # =========================================================================
  # Cable Images
  # =========================================================================

  /cable-images:
    get:
      operationId: listCableImages
      summary: List available cable transceiver images
      tags: [actions]
      x-ufm-upstream: GET /ufmRest/app/images/cables
      responses:
        "200":
          description: List of cable images.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
        default:
          $ref: "#/components/responses/Error"

    post:
      operationId: uploadCableImage
      summary: Upload a cable transceiver image
      tags: [actions]
      x-ufm-upstream: POST /ufmRest/app/images/cables
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "201":
          description: Image uploaded.
        default:
          $ref: "#/components/responses/Error"

  /cable-images/{image_name}:
    parameters:
      - name: image_name
        in: path
        required: true
        schema:
          type: string

    delete:
      operationId: deleteCableImage
      summary: Delete a cable transceiver image
      tags: [actions]
      x-ufm-upstream: DELETE /ufmRest/app/images/cables/{image_name}
      responses:
        "204":
          description: Image deleted.
        default:
          $ref: "#/components/responses/Error"

  # =========================================================================
  # Discovery
  # =========================================================================

  /discovery/inventory:
    get:
      operationId: getInventorySummary
      summary: Get fabric inventory summary
      tags: [discovery]
      x-ufm-upstream: GET /ufmRest/monitoring/inventory
      parameters:
        - name: include_ports
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Inventory summary.
          content:
            application/json:
              schema:
                type: object
        default:
          $ref: "#/components/responses/Error"

  /discovery/inventory/count:
    get:
      operationId: getInventoryCount
      summary: Get inventory component counts
      tags: [discovery]
      x-ufm-upstream: GET /ufmRest/monitoring/inventory/count
      responses:
        "200":
          description: Component counts.
          content:
            application/json:
              schema:
                type: object
        default:
          $ref: "#/components/responses/Error"

  /discovery/refresh:
    post:
      operationId: refreshFabricDiscovery
      summary: Trigger fabric discovery refresh
      description: Run after changing node descriptions to notify OpenSM.
      tags: [discovery]
      x-ufm-upstream: POST /ufmRest/actions/fabric_discovery_refresh
      responses:
        "202":
          description: Discovery refresh initiated.
        default:
          $ref: "#/components/responses/Error"

  # =========================================================================
  # Config
  # =========================================================================

  /config:
    get:
      operationId: getConfig
      summary: Get UFM configuration
      tags: [config]
      x-ufm-upstream: GET /ufmRest/app/ufm_config
      responses:
        "200":
          description: UFM configuration.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UFMConfig"
        default:
          $ref: "#/components/responses/Error"

    patch:
      operationId: updateConfig
      summary: Update UFM configuration
      description: |
        Partial update of UFM configuration. Not all sections and
        properties can be modified.
      tags: [config]
      x-ufm-upstream: PUT /ufmRest/app/ufm_config
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Configuration updated.
        default:
          $ref: "#/components/responses/Error"

  /config/dump-storage:
    put:
      operationId: configureDumpStorage
      summary: Configure external storage for system dumps
      tags: [config]
      x-ufm-upstream: PUT /ufmRest/app/profile/system_dump
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                storage_path:
                  type: string
      responses:
        "200":
          description: Storage configured.
        default:
          $ref: "#/components/responses/Error"

  /version:
    get:
      operationId: getVersion
      summary: Get UFM version information
      tags: [config]
      x-ufm-upstream: GET /ufmRest/app/ufm_version
      responses:
        "200":
          description: Version information.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UFMVersion"
        default:
          $ref: "#/components/responses/Error"

  /tokens:
    post:
      operationId: createToken
      summary: Generate an API access token
      description: |
        Authenticates with username/password and returns a reusable
        access token for subsequent API calls.
      tags: [config]
      x-ufm-upstream: POST /ufmRest/app/tokens
      security:
        - basicAuth: []
      responses:
        "200":
          description: Access token generated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  expires_at:
                    type: string
                    format: date-time
        default:
          $ref: "#/components/responses/Error"

# ---------------------------------------------------------------------------
# Components
# ---------------------------------------------------------------------------

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Token obtained from POST /tokens.
    basicAuth:
      type: http
      scheme: basic
      description: UFM username and password (or LDAP credentials).

  parameters:
    cursor:
      name: cursor
      in: query
      description: Pagination cursor from a previous response.
      schema:
        type: string
    limit:
      name: limit
      in: query
      description: Maximum number of items to return (default 100, max 1000).
      schema:
        type: integer
        default: 100
        minimum: 1
        maximum: 1000
    pkey:
      name: pkey
      in: path
      required: true
      description: "Partition key in hex format (e.g. `0x8001`)."
      schema:
        type: string
        pattern: "^0x[0-9a-fA-F]{1,4}$"

  responses:
    Error:
      description: Unexpected error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    # -- Error envelope ------------------------------------------------
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: Machine-readable error code.
              example: "partition_not_found"
            message:
              type: string
              description: Human-readable error description.
              example: "Partition 0x8001 does not exist."
            details:
              type: array
              items:
                type: object
                properties:
                  field:
                    type: string
                  reason:
                    type: string

    # -- Pagination envelope -------------------------------------------
    PageInfo:
      type: object
      properties:
        next_cursor:
          type: string
          nullable: true
          description: Cursor for next page, null if last page.
        total:
          type: integer
          description: Total number of items (if known).

    # -- Partitions ----------------------------------------------------
    Partition:
      type: object
      properties:
        pkey:
          type: string
          description: "Partition key in hex (e.g. `0x8001`)."
          example: "0x8001"
        name:
          type: string
          example: "tenant-gpu-cluster"
        ip_over_ib:
          type: boolean
        index0:
          type: boolean
        sharp_enabled:
          type: boolean
        qos:
          $ref: "#/components/schemas/PartitionQoS"
        members:
          type: array
          items:
            $ref: "#/components/schemas/PartitionMember"
          description: Present only when `include=members`.

    PartitionCreate:
      type: object
      required: [pkey]
      properties:
        pkey:
          type: string
          pattern: "^0x[0-9a-fA-F]{1,4}$"
          example: "0x12"
        name:
          type: string
          example: "tenant-alpha"
        ip_over_ib:
          type: boolean
          default: true
        index0:
          type: boolean
          default: false
        qos:
          $ref: "#/components/schemas/PartitionQoS"
        members:
          type: array
          items:
            $ref: "#/components/schemas/PartitionMemberInput"
          description: |
            Optional initial GUID members. If omitted, an empty
            partition is created.

    PartitionReplace:
      type: object
      required: [members]
      properties:
        name:
          type: string
        ip_over_ib:
          type: boolean
        index0:
          type: boolean
        qos:
          $ref: "#/components/schemas/PartitionQoS"
        members:
          type: array
          items:
            $ref: "#/components/schemas/PartitionMemberInput"

    PartitionQoS:
      type: object
      properties:
        mtu_limit:
          type: integer
          enum: [2, 4]
          default: 2
          description: "MTU limit: 2 = 2048, 4 = 4096."
        service_level:
          type: integer
          minimum: 0
          maximum: 15
          default: 0
        rate_limit:
          type: number
          default: 2.5
          description: Rate limit (predefined values).

    PartitionMember:
      type: object
      properties:
        guid:
          type: string
          example: "98039b0300860ace"
        membership:
          type: string
          enum: [full, limited]
        index0:
          type: boolean

    PartitionMemberInput:
      type: object
      required: [guid]
      properties:
        guid:
          type: string
          example: "98039b0300860ace"
        membership:
          type: string
          enum: [full, limited]
          default: full

    PartitionMembersAdd:
      type: object
      required: [members]
      properties:
        members:
          type: array
          items:
            $ref: "#/components/schemas/PartitionMemberInput"
        ip_over_ib:
          type: boolean
          default: true
        index0:
          type: boolean
          default: false

    PartitionHostsAdd:
      type: object
      required: [hosts]
      properties:
        hosts:
          type: array
          items:
            type: string
          description: Hostnames to add.
          example: ["r-ufm51", "r-ufm77"]
        membership:
          type: string
          enum: [full, limited]
          default: full
        ip_over_ib:
          type: boolean
          default: true
        index0:
          type: boolean
          default: false

    PartitionList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Partition"
        page_info:
          $ref: "#/components/schemas/PageInfo"

    PartitionMemberList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/PartitionMember"
        page_info:
          $ref: "#/components/schemas/PageInfo"

    # -- Systems -------------------------------------------------------
    System:
      type: object
      properties:
        guid:
          type: string
        name:
          type: string
        ip:
          type: string
        type:
          type: string
          enum: [switch, host, gateway, router]
        model:
          type: string
        role:
          type: string
          enum: [core, tor, endpoint]
        vendor:
          type: string
        firmware_version:
          type: string
        description:
          type: string
        ports:
          type: array
          items:
            $ref: "#/components/schemas/Port"
          description: Present only when `include=ports`.

    SystemUpdate:
      type: object
      properties:
        ip:
          type: string
        name:
          type: string
        url:
          type: string
        script:
          type: string

    SystemPower:
      type: object
      properties:
        system_id:
          type: string
        power_watts:
          type: number

    SystemList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/System"
        page_info:
          $ref: "#/components/schemas/PageInfo"

    # -- Ports ---------------------------------------------------------
    Port:
      type: object
      properties:
        name:
          type: string
        guid:
          type: string
        system_name:
          type: string
        system_guid:
          type: string
        physical_port_number:
          type: integer
        logical_port_state:
          type: string
        physical_port_state:
          type: string
        speed:
          type: string
        width:
          type: string
        external:
          type: boolean
        cable_info:
          type: object
          description: Present only when `include=cable_info`.

    VirtualPort:
      type: object
      properties:
        virtual_port_guid:
          type: string
        virtual_port_state:
          type: string
        virtual_port_lid:
          type: integer
        system_guid:
          type: string
        system_name:
          type: string
        system_ip:
          type: string
        port_guid:
          type: string
        port_name:
          type: string
        physical_port_number:
          type: integer

    PortList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Port"
        page_info:
          $ref: "#/components/schemas/PageInfo"

    VirtualPortList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/VirtualPort"
        page_info:
          $ref: "#/components/schemas/PageInfo"

    # -- Links ---------------------------------------------------------
    Link:
      type: object
      properties:
        source_port:
          type: string
        destination_port:
          type: string
        speed:
          type: string
        width:
          type: string

    LinkList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Link"
        page_info:
          $ref: "#/components/schemas/PageInfo"

    # -- Jobs ----------------------------------------------------------
    Job:
      type: object
      properties:
        id:
          type: string
        operation:
          type: string
        status:
          type: string
          enum: [running, completed, failed, aborted]
        created_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
          nullable: true
        sub_jobs:
          type: array
          items:
            $ref: "#/components/schemas/Job"
          description: Present only when `include=sub_jobs`.

    JobList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Job"
        page_info:
          $ref: "#/components/schemas/PageInfo"

    # -- Monitoring ----------------------------------------------------
    MonitoringSessionCreate:
      type: object
      properties:
        interval:
          type: integer
          description: Collection interval in seconds.
        attributes:
          type: array
          items:
            type: string
        members:
          type: array
          items:
            type: string

    MonitoringSession:
      type: object
      properties:
        id:
          type: string
        interval:
          type: integer
        attributes:
          type: array
          items:
            type: string
        status:
          type: string

    MonitoringSnapshotCreate:
      type: object
      properties:
        attributes:
          type: array
          items:
            type: string
        members:
          type: array
          items:
            type: string

    MonitoringTemplate:
      type: object
      properties:
        name:
          type: string
        interval:
          type: integer
        attributes:
          type: array
          items:
            type: string

    # -- Topology (Logical Model) --------------------------------------
    Environment:
      type: object
      properties:
        name:
          type: string
        description:
          type: string

    EnvironmentCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string

    EnvironmentList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Environment"
        page_info:
          $ref: "#/components/schemas/PageInfo"

    LogicalServer:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        computes:
          type: array
          items:
            $ref: "#/components/schemas/Compute"

    LogicalServerCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string

    Compute:
      type: object
      properties:
        name:
          type: string
        status:
          type: string
          enum: [allocated, free]

    Network:
      type: object
      properties:
        name:
          type: string
        pkey:
          type: string
        ip_over_ib:
          type: boolean

    NetworkCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
        pkey:
          type: string
        ip_over_ib:
          type: boolean

    # -- Mirroring -----------------------------------------------------
    MirroringTemplate:
      type: object
      properties:
        system_id:
          type: string
        target_port:
          type: string
        packet_size:
          type: integer
        service_level:
          type: integer

    MirroringAction:
      type: object
      required: [port_id, action]
      properties:
        port_id:
          type: string
        action:
          type: string
          enum: [enable, disable]
        rx:
          type: boolean
          default: true
        tx:
          type: boolean
          default: true

    # -- Templates (Provisioning) --------------------------------------
    ProvisioningTemplate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        system_type:
          type: string
        owner:
          type: string
        tags:
          type: array
          items:
            type: string
        content:
          type: array
          items:
            type: object
          description: Template command sequence.

    ProvisioningTemplateCreate:
      type: object
      required: [title, system_type, content]
      properties:
        title:
          type: string
        description:
          type: string
        system_type:
          type: string
        content:
          type: array
          items:
            type: object

    # -- Reports -------------------------------------------------------
    ReportCreate:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [Fabric_Health, UFM_Health, Topology_Compare]
        parameters:
          type: object
          additionalProperties: true
          description: Report-specific configuration parameters.

    # -- Config --------------------------------------------------------
    UFMConfig:
      type: object
      properties:
        default_session_interval:
          type: integer
        disabled_features:
          type: array
          items:
            type: string
        ha_mode:
          type: string
        is_local_user:
          type: boolean
        site_name:
          type: string

    UFMVersion:
